        /* ===== THEME TRANSITION ===== */
        .theme-transition,
        .theme-transition * {
            transition: background-color var(--md-transition, 0.32s),
                color var(--md-transition, 0.32s),
                border-color var(--md-transition, 0.32s),
                box-shadow var(--md-transition, 0.32s),
                fill var(--md-transition, 0.32s),
                stroke var(--md-transition, 0.32s),
                background var(--md-transition, 0.32s) !important;
        }

        /* ===== DYNAMIC THEME OVERRIDES ===== */
        .dynamic-theme-active {
            --md-primary: var(--ui-accent, var(--md-primary));
            --md-on-primary: #ffffff;
            --md-primary-container: var(--ui-surface-2, var(--md-primary-container));
            --md-on-primary-container: var(--ui-accent-2, var(--md-on-primary-container));
            --md-secondary: var(--ui-accent-2, var(--md-secondary));
            --md-secondary-container: var(--ui-surface-2, var(--md-secondary-container));
            --md-surface: var(--ui-surface, var(--md-surface));
            --md-on-surface: var(--ui-text, var(--md-on-surface));
            --md-background: var(--ui-bg, var(--md-background));
            --md-on-background: var(--ui-text, var(--md-on-background));
            --md-surface-variant: var(--ui-surface-2, var(--md-surface-variant));
            --md-surface-tint: var(--ui-accent, var(--md-surface-tint));
            --md-elevation1: 0 1px 3px 1px var(--ui-glow, #0000001f), 0 1px 2px 0 #0000003d;
            --md-elevation2: 0 2px 6px 2px var(--ui-glow, #0000001f), 0 1px 2px 0 #0000003d;
            --md-elevation3: 0 4px 8px 3px var(--ui-glow, #0000001f), 0 1px 3px 0 #0000003d;
            --md-elevation4: 0 6px 10px 4px var(--ui-glow, #0000001f), 0 2px 3px 0 #0000003d;
            --md-elevation5: 0 8px 12px 6px var(--ui-glow, #0000001f), 0 2px 4px 0 #0000003d;
            --md-progress-fill: var(--ui-progress-fill, var(--md-primary));
            --md-outline: var(--ui-border, var(--md-outline));
            --md-outline-variant: var(--ui-border, var(--md-outline-variant));
            --md-shadow: var(--ui-shadow, var(--md-shadow));
            --md-shape-md: var(--ui-control-radius, var(--md-shape-md));
            --md-shape-full: var(--ui-play-radius, var(--md-shape-full));
            --md-button-bg: var(--ui-button-bg, var(--md-surface-variant));
            --md-button-text: var(--ui-button-text, var(--md-on-surface-variant));
            --md-button-border: var(--ui-button-border, var(--md-outline));
        }

        .dynamic-theme-active.dark {
            --md-on-primary: #ffffff;
            --md-on-primary-container: #ffffff;
            --md-on-secondary: #ffffff;
            --md-on-surface: var(--ui-text, #e6e0e9);
            --md-on-background: var(--ui-text, #e6e0e9);
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--md-font);
            background: var(--md-background);
            color: var(--md-on-background);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            transition: background 0.25s, color 0.25s;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--md-outline-variant);
            border-radius: var(--md-shape-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--md-outline);
        }

        }

        .md-label-small {
            font-size: 0.688rem;
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: 0.015em;
        }

        .md-elevation-1 {
            box-shadow: var(--md-elevation1);
        }

        .md-elevation-2 {
            box-shadow: var(--md-elevation2);
        }

        .md-elevation-3 {
            box-shadow: var(--md-elevation3);
        }

        .md-elevation-4 {
            box-shadow: var(--md-elevation4);
        }

        .md-elevation-5 {
            box-shadow: var(--md-elevation5);
        }

        .md-shape-xs {
            border-radius: var(--md-shape-xs);
        }

        .md-shape-sm {
            border-radius: var(--md-shape-sm);
        }

        .md-shape-md {
            border-radius: var(--md-shape-md);
        }

        .md-shape-lg {
            border-radius: var(--md-shape-lg);
        }

        .md-shape-xl {
            border-radius: var(--md-shape-xl);
        }

        .md-shape-full {
            border-radius: var(--md-shape-full);
        }

        .md-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: var(--md-shape-full);
            font-family: var(--md-font);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.005em;
            cursor: pointer;
            transition: all var(--md-transition);
            background: var(--md-surface);
            color: var(--md-primary);
            box-shadow: var(--md-elevation1);
            min-height: 40px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .md-button:hover {
            box-shadow: var(--md-elevation2);
            filter: brightness(0.96);
        }

        .md-button:active {
            transform: scale(0.96);
            box-shadow: var(--md-elevation1);
        }

        .md-button.filled {
            background: var(--md-primary);
            color: var(--md-on-primary);
            box-shadow: var(--md-elevation1);
        }

        .md-button.filled:hover {
            box-shadow: var(--md-elevation2);
            filter: brightness(1.04);
        }

        .md-button.tonal {
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
            box-shadow: none;
        }

        .md-button.tonal:hover {
            background: color-mix(in srgb, var(--md-secondary-container) 92%, black);
        }

        .md-button.outlined {
            background: transparent;
            color: var(--md-primary);
            border: 1px solid var(--md-outline);
            box-shadow: none;
        }

        .md-button.outlined:hover {
            background: var(--md-surface);
            border-color: var(--md-primary);
        }

        .md-button.text {
            background: transparent;
            color: var(--md-primary);
            box-shadow: none;
        }

        .md-button.text:hover {
            background: var(--md-surface-variant);
        }

        .md-button:disabled {
            opacity: 0.38;
            pointer-events: none;
        }

        .md-icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: var(--md-shape-full);
            border: none;
            background: transparent;
            color: var(--md-on-surface-variant);
            cursor: pointer;
            transition: all var(--md-transition);
            font-size: 1.25rem;
            position: relative;
        }

        .md-icon-button:hover {
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
        }

        .md-icon-button:active {
            transform: scale(0.92);
        }

        .md-icon-button.filled {
            background: var(--md-primary);
            color: var(--md-on-primary);
        }

        .md-icon-button.filled:hover {
            background: color-mix(in srgb, var(--md-primary) 92%, black);
        }

        .md-icon-button.tonal {
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
        }

        .md-icon-button.tonal:hover {
            background: color-mix(in srgb, var(--md-secondary-container) 92%, black);
        }

        .md-icon-button.outlined {
            border: 1px solid var(--md-outline);
        }

        .md-icon-button.outlined:hover {
            border-color: var(--md-primary);
        }

        .md-card {
            background: var(--md-surface);
            color: var(--md-on-surface);
            border-radius: var(--md-shape-md);
            box-shadow: var(--md-elevation1);
            padding: 16px;
            transition: all var(--md-transition);
            border: 1px solid transparent;
        }

        .md-card:hover {
            box-shadow: var(--md-elevation2);
        }

        .md-card.outlined {
            border-color: var(--md-outline-variant);
            box-shadow: none;
        }

        .md-card.outlined:hover {
            border-color: var(--md-outline);
        }

        .md-text-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .md-text-field .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--md-surface-variant);
            border-radius: var(--md-shape-xs) var(--md-shape-xs) 0 0;
            border-bottom: 2px solid var(--md-outline);
            transition: border-color var(--md-transition), background var(--md-transition);
            padding: 0 12px;
            min-height: 48px;
        }

        .md-text-field .input-wrap:hover {
            background: color-mix(in srgb, var(--md-surface-variant) 96%, black);
        }

        .md-text-field .input-wrap:focus-within {
            border-bottom-color: var(--md-primary);
            background: var(--md-surface-variant);
        }

        .md-text-field .input-wrap .icon {
            color: var(--md-on-surface-variant);
            font-size: 1.125rem;
            margin-right: 8px;
        }

        .md-text-field input,
        .md-text-field textarea,
        .md-text-field select {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--md-on-surface);
            font-family: var(--md-font);
            font-size: 0.875rem;
            font-weight: 400;
            padding: 12px 0;
            line-height: 1.4;
            width: 100%;
            resize: none;
        }

        .md-text-field textarea {
            min-height: 40px;
            max-height: 120px;
        }

        .md-text-field .label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--md-on-surface-variant);
            padding-left: 12px;
            letter-spacing: 0.01em;
        }

        .md-text-field .supporting {
            font-size: 0.688rem;
            color: var(--md-on-surface-variant);
            padding-left: 12px;
            min-height: 18px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--md-surface);
            border-bottom: 1px solid var(--md-outline-variant);
            z-index: 100;
            gap: 8px;
            flex-shrink: 0;
            min-height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--md-on-surface);
            cursor: pointer;
            letter-spacing: -0.01em;
        }

        .logo .logo-icon {
            font-size: 1.6rem;
            color: var(--md-primary);
        }

        .header-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .header-actions .md-icon-button {
            width: 40px;
            height: 40px;
            font-size: 1.1rem;
        }

        .model-badge-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 8px;
            border-radius: var(--md-shape-full);
            background: var(--md-surface-variant);
            cursor: pointer;
            transition: all var(--md-transition);
            border: 1px solid transparent;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--md-on-surface-variant);
            max-width: 180px;
        }

        .model-badge-wrap:hover {
            background: color-mix(in srgb, var(--md-surface-variant) 92%, black);
            border-color: var(--md-outline);
        }

        .model-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all var(--md-transition);
        }

        .model-badge-dot.online {
            background: #4caf50;
            box-shadow: 0 0 0 2px #4caf5040;
        }

        .model-badge-dot.offline {
            background: var(--md-error);
            box-shadow: 0 0 0 2px var(--md-error)40;
        }

        .model-badge-dot.idle {
            background: #ffb300;
            box-shadow: 0 0 0 2px #ffb30040;
        }

        .model-badge-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== MAIN CONTENT & PANELS ===== */
        .main-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--md-background);
        }

        .panel {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            animation: fadeSlideIn 0.3s ease;
        }

        .panel.active {
            display: flex;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CHAT PANEL ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: msgIn 0.25s ease;
            gap: 4px;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.assistant {
            align-self: flex-start;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--md-on-surface-variant);
        }

        .msg-header .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: var(--md-shape-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
        }

        .msg.user .msg-header .msg-avatar {
            background: var(--md-primary);
            color: var(--md-on-primary);
        }

        .msg.assistant .msg-header .msg-avatar {
            background: var(--md-secondary-container);
            color: var(--md-on-secondary-container);
        }

        .msg-timestamp {
            font-size: 0.7rem;
            color: var(--md-on-surface-variant);
            opacity: 0.7;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--md-shape-md);
            line-height: 1.5;
            word-break: break-word;
            font-size: 0.9rem;
            background: var(--md-surface-variant);
            color: var(--md-on-surface-variant);
            border-bottom-left-radius: var(--md-shape-xs);
            position: relative;
        }

        .msg.user .msg-bubble {
            background: var(--md-primary);
            color: var(--md-on-primary);
            border-bottom-right-radius: var(--md-shape-xs);
        }

        .msg-bubble .msg-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--md-shape-sm);
            object-fit: contain;
            margin: 4px 0;
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
        }

        .msg-bubble .msg-image:hover {
            transform: scale(1.02);
        }

        .msg-bubble .msg-image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 4px 0;
        }

        .msg-bubble .msg-image-grid .msg-image {
            max-width: 120px;
            max-height: 120px;
            flex: 1 1 auto;
            min-width: 60px;
        }

        .msg-bubble pre {
            background: var(--md-surface);
            padding: 10px;
            border-radius: var(--md-shape-sm);
            overflow-x: auto;
            font-size: 0.8rem;
            margin: 4px 0;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid var(--md-outline-variant);
        }

        .msg-bubble .message-emoji {
            width: 1.4em;
            height: 1.4em;
            vertical-align: middle;
            display: inline-block;
            object-fit: contain;
            background: transparent !important;
        }

        .msg-actions {
            display: flex;
            gap: 4px;
            padding: 2px 4px;
            align-items: center;
            opacity: 0.4;
            transition: opacity var(--md-transition);
        }

        .msg:hover .msg-actions {
            opacity: 1;
        }

        .msg-actions button {
            background: transparent;
            border: none;
            color: var(--md-on-surface-variant);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: var(--md-shape-sm);
            transition: all var(--md-transition);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .msg-actions button:hover {
            background: var(--md-surface-variant);
            color: var(--md-on-surface);
        }

        .msg-actions button .action-label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        .msg.user .msg-actions button {
            color: var(--md-on-surface-variant);
        }

        .msg.user .msg-actions button:hover {
            background: color-mix(in srgb, var(--md-primary) 85%, black);
            color: var(--md-on-primary);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 6px 12px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--md-on-surface-variant);
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 8px 12px;
            background: var(--md-surface);
            border-top: 1px solid var(--md-outline-variant);
            display: flex;
            gap: 6px;
            align-items: flex-end;
            flex-shrink: 0;
            flex-wrap: wrap;
            position: relative;
        }

        .chat-input-row {
            flex: 1;
            display: flex;
            gap: 4px;
            align-items: flex-end;
            background: var(--md-surface-variant);
            border-radius: var(--md-shape-lg);
            padding: 2px 8px;
            border: 1px solid transparent;
            transition: all var(--md-transition);
            min-width: 0;
        }

        .chat-input-row:focus-within {
            border-color: var(--md-primary);
            background: var(--md-surface);
        }

        .chat-textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--md-on-surface);
            font-family: var(--md-font);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            min-height: 28px;
            max-height: 120px;
            padding: 6px 4px;
            line-height: 1.4;
            width: 100%;
        }

        .chat-textarea::placeholder {
            color: var(--md-on-surface-variant);
        }

        .chat-input-actions {
            display: flex;
            gap: 2px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-send {
            width: 40px;
            height: 40px;
            border-radius: var(--md-shape-full);
            background: var(--md-primary);
            color: var(--md-on-primary);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--md-transition);
            flex-shrink: 0;
        }

        .btn-send:hover {
            filter: brightness(1.05);
            box-shadow: var(--md-elevation2);
        }

        .btn-send:active {
            transform: scale(0.92);
        }

        .chat-input-area .md-icon-button {
            width: 36px;
            height: 36px;
            font-size: 0.95rem;
        }

        .chat-input-area .md-icon-button.voice-active {
            background: var(--md-error);
            color: var(--md-on-error);
            animation: voicePulse 0.8s infinite;
        }

        @keyframes voicePulse {
            0%, 100% {
                box-shadow: 0 0 0 0 var(--md-error)60;
            }
            50% {
                box-shadow: 0 0 0 12px var(--md-error)00;
            }
        }

        .emoji-picker-3d {
            position: absolute;
            bottom: 72px;
            left: 8px;
            z-index: 80;
            background: var(--md-surface);
            border: 1px solid var(--md-outline-variant);
            border-radius: var(--md-shape-md);
            padding: 8px;
            max-width: 320px;
            max-height: 240px;
            overflow-y: auto;
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            box-shadow: var(--md-elevation3);
        }

        .emoji-picker-3d.open {
            display: flex;
        }

        .emoji-picker-3d .emoji-3d-item {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--md-shape-sm);
            cursor: pointer;
            transition: all var(--md-transition);
            background: transparent;
        }

        .emoji-picker-3d .emoji-3d-item:hover {
            background: var(--md-surface-variant);
            transform: scale(1.05);
        }

        .emoji-picker-3d .emoji-3d-item img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            background: transparent !important;
        }

        .file-preview {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 0 16px 4px;
        }

        .file-preview-item {
            background: var(--md-surface-variant);
            padding: 4px 10px;
            border-radius: var(--md-shape-sm);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: default;
            color: var(--md-on-surface-variant);
        }

        .file-preview-item .remove {
            cursor: pointer;
            color: var(--md-error);
            font-weight: 600;
        }

        /* ===== IMAGE & VIDEO PANELS ===== */
        .generation-panel {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            height: 100%;
            overflow-y: auto;
        }

        .generation-panel h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--md-on-surface);
        }

        .generation-panel p {
            color: var(--md-on-surface-variant);
            text-align: center;
        }

        .input-wrapper {
            background: var(--md-surface-variant);
            border-radius: var(--md-shape-sm);
            border: 1px solid var(--md-outline-variant);
            transition: border-color var(--md-transition);
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 450px;
        }

        .input-wrapper:focus-within {
            border-color: var(--md-primary);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 14px;
            color: var(--md-on-surface);
            outline: none;
            font-family: inherit;
        }

        .gen-preview-img {
            max-width: 100%;
            border-radius: var(--md-shape-md);
            box-shadow: var(--md-elevation2);
            max-height: 400px;
            object-fit: contain;
        }

        .d-flex {
            display: flex;
        }

        .gap-2 {
            gap: 8px;
        }

        .mt-2 {
            margin-top: 8px;
        }

        .mt-3 {
            margin-top: 16px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--md-outline-variant);
            border-top-color: var(--md-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            display: flex;
            background: var(--md-surface);
            border-top: 1px solid var(--md-outline-variant);
            flex-shrink: 0;
            height: var(--md-nav-height);
            z-index: 100;
            box-shadow: var(--md-elevation2);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            color: var(--md-on-surface-variant);
            transition: all var(--md-transition);
            border: none;
            background: transparent;
            font-family: var(--md-font);
            font-size: 0.65rem;
            font-weight: 500;
            position: relative;
            padding: 4px 0;
            letter-spacing: 0.01em;
        }

        .nav-item .nav-icon {
            font-size: 1.4rem;
            transition: all var(--md-transition);
        }

        .nav-item.active {
            color: var(--md-primary);
        }

        .nav-item.active .nav-icon {
            transform: scale(1.05);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: var(--md-primary);
            border-radius: 0 0 3px 3px;
        }

        .nav-item:hover {
            color: var(--md-on-surface);
        }

        /* ===== SETTINGS MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--md-shadow);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;

            border: 1px solid var(--md-outline-variant);
            border-radius: var(--md-shape-full);
            padding: 6px 14px;
            color: var(--md-on-surface);
            font-size: 14px;
        }

        body.dark #yt-section .playlist-import input {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e6e0e9;
        }

        #yt-section .playlist-import input:focus {
            outline: none;
            border-color: var(--md-primary);
        }

        #yt-section .playlist-import button {
            padding: 6px 16px;
            border-radius: var(--md-shape-full);
            border: none;
            background: var(--md-primary);
            color: var(--md-on-primary);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #yt-section .playlist-import button:hover {
            filter: brightness(1.05);
        }

        #yt-section .playlist-import button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #yt-section #translationServiceSelect {
            background: var(--md-surface-variant);
            border: 1px solid var(--md-outline-variant);
            border-radius: var(--md-shape-sm);
            padding: 4px 10px;
            color: var(--md-on-surface);
            font-size: 14px;
        }

        body.dark #yt-section #translationServiceSelect {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e6e0e9;
        }

        #yt-section .yt-player-card .extra-controls .sponsor-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--md-on-surface-variant);
        }

        body.dark #yt-section .yt-player-card .extra-controls .sponsor-toggle {
            color: #cac4d0;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        #yt-section .yt-music-container .d-none {
            display: none !important;
        }

        /* ==========================================================================
           OFFLINE SECTION – upgraded CSS
           ========================================================================== */
        #offline-section {
            padding: 0 4px;
            overflow-y: auto;
        }

        #offline-section .offline-container {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .offline-upload-area {
            border: 2px dashed var(--md-outline);
            border-radius: var(--md-shape-md);
            padding: 28px 16px;
            text-align: center;
            transition: border-color var(--md-transition), background var(--md-transition);
            cursor: pointer;
            background: var(--md-surface-variant);
            color: var(--md-on-surface-variant);
            display: block !important;
        }

        .offline-upload-area.dragover {
            border-color: var(--md-primary);
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
        }

        .offline-upload-area:hover {
            border-color: var(--md-primary);
        }

        .offline-upload-text {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .offline-upload-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .offline-upload-actions .md-button {
            padding: 8px 18px;
            font-size: 0.85rem;
        }

        .offline-file-input {
            display: none;
        }

        .offline-current-song {
            text-align: center;
            padding: 6px 0 12px;
        }

        .offline-current-song .offline-song-title {
            font: var(--md-headline-small);
            color: var(--md-on-surface);
        }

        .offline-current-song .offline-song-info {
            font: var(--md-body-medium);
            color: var(--md-on-surface-variant);
        }

        .offline-album-art {
            display: block;
            margin: 0 auto 12px;
            max-width: 160px;
            max-height: 160px;
            border-radius: var(--md-shape-md);
            box-shadow: var(--md-elevation2);
            background: var(--md-surface-variant);
            object-fit: cover;
        }

        .offline-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .offline-controls .md-icon-button {
            width: 44px;
            height: 44px;
            font-size: 1.1rem;
            background: var(--md-surface-variant);
            color: var(--md-on-surface-variant);
            box-shadow: var(--md-elevation1);
        }

        .offline-controls .md-icon-button:hover {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
        }

        .offline-controls .md-icon-button.play-pause-btn {
            width: 56px;
            height: 56px;
            font-size: 1.4rem;
            background: var(--md-primary);
            color: var(--md-on-primary);
            box-shadow: var(--md-elevation3);
        }

        .offline-controls .md-icon-button.play-pause-btn:hover {
            filter: brightness(1.05);
            box-shadow: var(--md-elevation4);
        }

        .offline-controls .md-icon-button.active {
            background: var(--md-primary);
            color: var(--md-on-primary);
        }

        .offline-controls .md-icon-button.active:hover {
            filter: brightness(1.05);
        }

        .offline-controls .md-icon-button .repeat-indicator,
        .offline-controls .md-icon-button .shuffle-indicator {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--md-primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .offline-controls .md-icon-button.active .repeat-indicator,
        .offline-controls .md-icon-button.active .shuffle-indicator {
            opacity: 1;
        }

        .offline-progress-container {
            margin: 8px 0 12px;
        }

        .offline-progress-bar {
            width: 100%;
            height: 6px;
            background: var(--md-outline-variant);
            border-radius: var(--md-shape-full);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .offline-progress-fill {
            height: 100%;
            background: var(--md-primary);
            border-radius: var(--md-shape-full);
            transition: width 0.1s;
            width: 0%;
        }

        .offline-time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font: var(--md-body-small);
            color: var(--md-on-surface-variant);
        }

        .offline-volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--md-on-surface-variant);
        }

        .offline-volume-slider {
            width: 120px;
            height: 4px;
            background: var(--md-outline-variant);
            border-radius: var(--md-shape-full);
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .offline-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--md-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--md-elevation1);
        }

        .offline-volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--md-primary);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .offline-playlist {
            background: var(--md-surface);
            border-radius: var(--md-shape-lg);
            padding: 12px 16px;
            box-shadow: var(--md-elevation1);
            border: 1px solid var(--md-outline-variant);
            max-height: 220px;
            overflow-y: auto;
        }

        .offline-playlist::-webkit-scrollbar {
            width: 4px;
        }

        .offline-playlist::-webkit-scrollbar-track {
            background: transparent;
        }

        .offline-playlist::-webkit-scrollbar-thumb {
            background: var(--md-outline-variant);
            border-radius: var(--md-shape-full);
        }

        .offline-playlist-title {
            font: var(--md-title-small);
            margin-bottom: 10px;
            text-align: center;
            color: var(--md-on-surface);
        }

        .offline-playlist-item {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: var(--md-shape-sm);
            cursor: pointer;
            transition: background var(--md-transition);
            margin-bottom: 4px;
            gap: 10px;
            border: 1px solid transparent;
        }

        .offline-playlist-item:hover {
            background: var(--md-surface-variant);
        }

        .offline-playlist-item.active {
            background: var(--md-primary-container);
            color: var(--md-on-primary-container);
            border-color: var(--md-primary);
        }

        .offline-playlist-item .offline-song-number {
            font: var(--md-label-medium);
            width: 24px;
            text-align: center;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .offline-playlist-item.active .offline-song-number {
            opacity: 1;
        }

        .offline-playlist-item .offline-song-details {
            flex: 1;
            min-width: 0;
        }

        .offline-playlist-item .offline-song-name {
            font: var(--md-body-medium);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .offline-playlist-item .offline-song-duration {
            font: var(--md-body-small);
            opacity: 0.7;
        }

        .offline-playlist-item .offline-remove-btn {
            background: var(--md-surface-variant);
            color: var(--md-on-surface-variant);
            border: none;
            border-radius: var(--md-shape-full);
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--md-transition), color var(--md-transition);
            opacity: 0;
            flex-shrink: 0;
            font-size: 0.8rem;
        }

        .offline-playlist-item:hover .offline-remove-btn {
            opacity: 1;
        }

        .offline-playlist-item .offline-remove-btn:hover {
            background: var(--md-error);
            color: var(--md-on-error);
        }

        .offline-empty-playlist {
            text-align: center;
            padding: 24px 8px;
            color: var(--md-on-surface-variant);
            font: var(--md-body-medium);
        }

        /* ===== VISUALIZER CONTAINER ===== */
        .offline-visualizer-container {
            text-align: center;
            margin-bottom: 8px;
            position: relative;
        }

        .offline-visualizer-container canvas {
            display: none;
            width: 100%;
            max-width: 512px;
            height: 100px;
            border-radius: var(--md-shape-md);
            background: transparent !important;
            margin: 0 auto;
            box-shadow: 0 0 20px var(--ui-glow, rgba(103, 80, 164, 0.15));
            border: 1px solid var(--ui-border, rgba(202, 196, 208, 0.3));
            transition: box-shadow var(--md-transition), border-color var(--md-transition);
        }

        .offline-visualizer-container canvas.active {
            display: block;
        }

        /* ===== VISUALIZER CONTROLS ===== */
        .offline-viz-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            padding: 12px 16px;
            background: var(--md-surface);
            border-radius: var(--md-shape-md);
            border: 1px solid var(--md-outline-variant);
            box-shadow: var(--md-elevation1);
            transition: all var(--md-transition);
        }

        .offline-viz-controls.visible {
            display: flex;
        }

        .viz-control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--md-on-surface-variant);
        }

        .viz-control-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .viz-control-row select,
        .viz-control-row input[type="number"],
        .viz-control-row input[type="range"] {
            background: var(--md-surface-variant);
            border: 1px solid var(--md-outline-variant);
            border-radius: var(--md-shape-sm);
            padding: 4px 8px;
            color: var(--md-on-surface);
            font-family: var(--md-font);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .viz-control-row select:focus,
        .viz-control-row input:focus {
            border-color: var(--md-primary);
        }

        .viz-control-row input[type="range"] {
            width: 80px;
            padding: 0;
            background: transparent;
            accent-color: var(--md-primary);
        }

        .viz-control-row button.btn-sm {
            padding: 4px 12px;
            font-size: 0.75rem;
            min-height: 28px;
        }

        .viz-status {
            font-size: 0.75rem;
            color: var(--md-on-surface-variant);
            text-align: center;
            padding: 4px 0;
        }

        /* ===== HIDE THE FILE INPUT IN CHAT ===== */
        #fileInput {
            display: none !important;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="switchPanel('chat')" title="HEX AI Home">
            <i class="fas fa-hexagon logo-icon"></i>
            <span>HEX AI</span>
        </div>
        <div class="header-actions">
            <div class="model-badge-wrap" id="modelBadgeWrap" onclick="toggleSettings()" title="Click to configure">
                <span class="model-badge-dot offline" id="modelBadgeDot"></span>
                <span class="model-badge-text" id="modelBadgeText">No API Key</span>
            </div>
            <button class="md-icon-button" id="themeToggleBtn" onclick="toggleThemeMode()" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="main-content">

        <!-- CHAT PANEL -->
        <div class="panel active" id="panel-chat">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="msg assistant">
                        <div class="msg-header">
                            <span class="msg-avatar"><i class="fas fa-robot"></i></span>
                            <span class="msg-timestamp">just now</span>
                        </div>
                        <div class="msg-bubble">
                            <strong>⬡ HEX AI</strong> — Material 3 Edition ♫ 💃<br />
                            Chat, generate images/videos, play YouTube music.<br />
                            <strong>Configure API keys</strong> in Settings (⚙) to unlock all features.<br />
                            <span style="font-size:0.8rem;color:var(--md-on-surface-variant);">
                                💡 Attach images and Gemini will analyze them! <br>
                                Each message now has <strong>Copy</strong>, <strong>Share</strong>, and
                                <strong>Delete</strong> buttons.<br>
                                ♫ In the Music player, click <strong>Analyze</strong> to get a summary, or use the <strong>Summarizer</strong> tab for any video.
                            </span>
                        </div>
                        <div class="msg-actions">
                            <button data-action="copy" data-msgid="welcome"><i class="fas fa-copy"></i> <span class="action-label">Copy</span></button>
                            <button data-action="share" data-msgid="welcome"><i class="fas fa-share-alt"></i> <span class="action-label">Share</span></button>
                            <button data-action="delete" data-msgid="welcome"><i class="fas fa-trash"></i> <span class="action-label">Delete</span></button>
                        </div>
                    </div>
                </div>
                <div class="file-preview" id="filePreview" style="padding:0 16px;"></div>
                <div class="chat-input-area" style="position:relative;">
                    <div class="emoji-picker-3d" id="emojiPicker3D"></div>
                    <button class="md-icon-button" id="emojiBtn" onclick="toggleEmojiPicker()" title="Emoji">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button class="md-icon-button" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Attach Image/PDF">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <!-- file input is hidden by CSS -->
                    <input type="file" id="fileInput" accept="image/*,.pdf" multiple onchange="handleFileAttach(event)" />
                    <div class="chat-input-row">
                        <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="Message HEX AI..." onkeydown="handleChatKey(event)"></textarea>
                        <div class="chat-input-actions">
                            <button class="md-icon-button" id="voiceBtn" onclick="toggleVoiceInput()" title="Voice Input">
                                <i class="fas fa-microphone"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- IMAGE PANEL -->
        <div class="panel" id="panel-image">
            <div class="generation-panel">
                <h2>AI Image Generator</h2>
                <p>Generate stunning AI images and add them to your chat.</p>
                <div class="input-wrapper" style="width:100%;max-width:450px;">
                    <input type="text" id="imgPromptInput" placeholder="Describe the image..." style="flex:1;border:none;background:transparent;padding:10px;font-size:14px;color:var(--md-on-surface);outline:none;font-family:inherit;">
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button class="md-button filled" id="generateImageBtn"><i class="fas fa-magic"></i> Generate</button>
                    <button class="md-button tonal" id="clearGenImageBtn"><i class="fas fa-times"></i> Clear</button>
                </div>
                <div id="imageGenPreviewContainer" class="mt-3" style="width:100%;max-width:450px;text-align:center;color:var(--md-on-surface-variant);">
                    <i class="fas fa-image" style="font-size:2rem;display:block;margin-bottom:8px;"></i> preview
                </div>
                <div id="genImageActions" style="display:none;" class="d-flex gap-2 mt-2">
                    <button class="md-button filled" id="addToChatBtn"><i class="fas fa-plus-circle"></i> Add to Chat</button>
                    <button class="md-button tonal" id="downloadGenImageBtn"><i class="fas fa-download"></i> Download</button>
                </div>
            </div>
        </div>

        <!-- VIDEO PANEL -->
        <div class="panel" id="panel-video">
            <div class="generation-panel">
                <h2>AI Video Generator</h2>
                <p>Enter a prompt to generate an animated video.</p>
                <div class="input-wrapper" style="width:100%;max-width:450px;">
                    <input type="text" id="videoPromptInput" placeholder="Describe the scene..." style="flex:1;border:none;background:transparent;padding:10px;font-size:14px;color:var(--md-on-surface);outline:none;font-family:inherit;">
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button class="md-button filled" id="generateVideoBtn"><i class="fas fa-magic"></i> Generate</button>
                    <button class="md-button tonal" id="clearVideoBtn"><i class="fas fa-times"></i> Clear</button>
                </div>
                <div id="videoGenStatus" style="display:block;color:var(--md-on-surface-variant);margin-top:16px;"><i class="fas fa-film"></i> preview</div>
                <canvas id="videoPreviewCanvas" width="512" height="512" style="display:none; border-radius:16px; box-shadow:var(--md-elevation3); max-width:100%;"></canvas>
                <video id="videoPreview" controls style="display:none; border-radius:16px; box-shadow:var(--md-elevation3); max-width:100%;"></video>
                <div id="videoActions" class="video-actions" style="display:none;">
                    <button class="md-button filled" id="downloadVideoBtn"><i class="fas fa-download"></i> Download</button>
                </div>
            </div>
        </div>

        <!-- MUSIC PANEL -->
        <div class="panel" id="panel-music">
            <div id="musicPanel">
                <div class="music-tabs">
                    <button class="md-button filled" id="ytTab" onclick="switchMusicTab('yt')">YouTube Music</button>
                    <button class="md-button" id="offlineTab" onclick="switchMusicTab('offline')">Offline Music</button>
                </div>

                <!-- YOUTUBE SECTION -->
                <div class="music-section active" id="yt-section">
                    <div class="yt-music-container" id="ytMusicContainer">
                        <div class="yt-music-row">
                            <div class="yt-player-card" id="playerCard">
                                <div class="album-art-container">
                                    <img id="albumArt" src="https://via.placeholder.com/300" alt="Album Art" />
                                    <div id="videoPlayerInAlbumArt"></div>
                                </div>
                                <div id="nowPlaying">
                                    <div class="song-title">No Song</div>
                                    <div class="author-name">&nbsp;</div>
                                </div>
                                <div class="controls">
                                    <button id="prevBtn" title="Previous"><i class="fas fa-step-backward"></i></button>
                                    <button id="playPauseBtn" title="Play/Pause"><i class="fas fa-play" style="color:#fff;font-size:1.1rem;"></i></button>
                                    <button id="nextBtn" title="Next"><i class="fas fa-step-forward"></i></button>
                                </div>
                                <div class="progress-container">
                                    <div class="progress" id="progressBar">
                                        <div id="progress" style="width:0%"></div>
                                    </div>
                                    <div class="time-display">
                                        <span id="currentTime">0:00</span>
                                        <span id="totalTime">0:00</span>
                                    </div>
                                </div>
                                <div class="volume-container">
                                    <span class="volume-icon"><i class="fas fa-volume-up"></i></span>
                                    <div class="volume-bar-container">
                                        <div class="volume-bar" id="volumeProgress" style="width:70%"></div>
                                        <div class="volume-thumb" id="volumeThumb" style="left:70%"></div>
                                        <input type="range" id="volumeControl" min="0" max="100" value="70" />
                                    </div>
                                </div>
                                <div class="extra-controls">
                                    <div class="auto-play-toggle">
                                        <span>Auto-Play</span>
                                        <label class="switch">
                                            <input type="checkbox" id="autoPlayToggle" checked />
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                    <div class="repeat-toggle">
                                        <span>Repeat</span>
                                        <button id="repeatBtn"><i class="fas fa-repeat"></i></button>
                                    </div>
                                    <div class="sponsor-toggle">
                                        <span>SponsorBlock</span>
                                        <label class="switch">
                                            <input type="checkbox" id="sponsorBlockToggle" checked />
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                    <div class="album-art-display-toggle">
                                        <div class="btn-group btn-group-sm" id="albumArtDisplayToggle">
                                            <button class="btn btn-outline-primary active" data-mode="spin">Spin</button>
                                            <button class="btn btn-outline-primary" data-mode="none">None</button>
                                            <button class="btn btn-outline-primary" data-mode="video">Video</button>
                                        </div>
                                    </div>
                                    <div class="bg-playback-toggle">
                                        <span>Background Playback</span>
                                        <label class="switch">
                                            <input type="checkbox" id="bgPlaybackToggle" />
                                            <span class="slider"></span>
                                        </label>
                                        <span class="help-note">(keeps audio alive)</span>
                                    </div>
                                    <div class="analyze-btn-wrapper">
                                        <button id="analyzeBtn" onclick="analyzeYouTubeVideo()"><i class="fas fa-microchip"></i> Analyze</button>
                                    </div>
                                </div>
                                <div id="errorMessage" style="display:none;"></div>
                                <div id="playerContainer" style="display:none;">

    <script>
        // =============================================================
        //  THEME ENGINE – Complete with all presets
        // =============================================================

        (() => {
            const THEME_CLASS = 'theme-transition';
            const TRANSITION_MS = 320;

            let albumArtEl = null;
            let dynamicEnabled = true;

            const ThemeEngine = {
                init(options = {}) {
                    albumArtEl = options.albumArtEl || document.getElementById('albumArt');
                    const savedTheme = localStorage.getItem('hexai_theme_appearance') || 'default';
                    const sel = document.getElementById('themeAppearanceSelect');
                    if (sel) {
                        sel.value = savedTheme;
                        this.applyThemeAppearance(savedTheme);
                    }
                },

                applyThemeAppearance(theme) {
                    const root = document.documentElement;
                    if (theme === 'default') {
                        root.removeAttribute('data-theme');
                        document.body.classList.remove('dynamic-theme-active');
                        if (dynamicEnabled && albumArtEl && albumArtEl.src && albumArtEl.src !== 'https://via.placeholder.com/300') {
                            this.applyVibrantFromUrl(albumArtEl.src);
                        }
                    } else {
                        root.setAttribute('data-theme', theme);
                        const isDark = document.body.classList.contains('dark');
                        root.setAttribute('data-mode', isDark ? 'dark' : 'light');
                        document.body.classList.add('dynamic-theme-active');
                    }
                    localStorage.setItem('hexai_theme_appearance', theme);
                },

                syncMode() {
                    const root = document.documentElement;
                    const theme = root.getAttribute('data-theme');
                    if (theme) {
                        const isDark = document.body.classList.contains('dark');
                        root.setAttribute('data-mode', isDark ? 'dark' : 'light');
                    }
                },

                setDynamicEnabled(enabled) {
                    dynamicEnabled = Boolean(enabled);
                },

                async applyVibrantFromImage(img) {
                    if (!dynamicEnabled || !img) return;
                    const palette = await getPalette(img);
                    if (!palette) return;
                    applyPalette(palette);
                    document.body.classList.add('dynamic-theme-active');
                },

                async applyVibrantFromUrl(url) {
                    if (!dynamicEnabled || !url || url === 'https://via.placeholder.com/300') {
                        this.clearDynamicPalette();
                        document.body.classList.remove('dynamic-theme-active');
                        return;
                    }
                    const img = await loadImage(url);
                    if (!img) return;
                    return this.applyVibrantFromImage(img);
                },

                clearDynamicPalette() {
                    const root = document.documentElement.style;
                    root.removeProperty('--ui-accent');
                    root.removeProperty('--ui-accent-2');
                    root.removeProperty('--ui-progress-fill');
                    root.removeProperty('--ui-glow');
                    root.removeProperty('--ui-bg');
                    root.removeProperty('--ui-surface');
                    root.removeProperty('--ui-surface-2');
                    root.removeProperty('--ui-text');
                    root.removeProperty('--ui-text-muted');
                    root.removeProperty('--ui-border');
                    root.removeProperty('--ui-shadow');
                    root.removeProperty('--ui-progress-bg');
                    root.removeProperty('--ui-button-bg');
                    root.removeProperty('--ui-button-text');
                    root.removeProperty('--ui-button-border');
                    root.removeProperty('--ui-control-radius');
                    root.removeProperty('--ui-play-radius');
                    root.removeProperty('--ui-scanline');
                    document.body.classList.remove('dynamic-theme-active');
                }
            };

            function withTransition(fn) {
                const root = document.documentElement;
                root.classList.add(THEME_CLASS);
                fn();
                window.setTimeout(() => root.classList.remove(THEME_CLASS), TRANSITION_MS);
            }

            async function getPalette(img) {
                if (window.Vibrant) {
                    try {
                        const palette = await new Vibrant(img).getPalette();
                        return {
                            accent: swatchToRgb(palette.Vibrant || palette.Muted),
                            accent2: swatchToRgb(palette.LightVibrant || palette.LightMuted),
                            bg: swatchToRgb(palette.DarkMuted || palette.DarkVibrant),
                            surface: swatchToRgb(palette.Muted || palette.DarkMuted)
                        };
                    } catch (err) {
                        return null;
                    }
                }
                if (window.ColorThief) {
                    try {
                        const colorThief = new ColorThief();
                        const [primary, secondary] = colorThief.getPalette(img, 2);
                        return {
                            accent: rgbArrayToCss(primary),
                            accent2: rgbArrayToCss(secondary || primary),
                            bg: rgbArrayToCss(darken(primary, 0.7)),
                            surface: rgbArrayToCss(darken(primary, 0.85))
                        };
                    } catch (err) {
                        return null;
                    }
                }
                return null;
            }

            function applyPalette(palette) {
                withTransition(() => {
                    const root = document.documentElement.style;
                    if (palette.accent) root.setProperty('--ui-accent', palette.accent);
                    if (palette.accent2) root.setProperty('--ui-accent-2', palette.accent2);
                    if (palette.bg) root.setProperty('--ui-bg', palette.bg);
                    if (palette.surface) {
                        root.setProperty('--ui-surface', palette.surface);
                        root.setProperty('--ui-surface-2', lightenCss(palette.surface, 0.08));
                    }
                    root.setProperty('--ui-progress-fill', palette.accent || 'var(--ui-accent)');
                    root.setProperty('--ui-glow', glowFrom(palette.accent || '#00b3ff'));
                });
            }

            function swatchToRgb(swatch) {
                if (!swatch) return null;
                const rgb = swatch.getRgb();
                return rgbArrayToCss(rgb);
            }

            function rgbArrayToCss(rgb) {
                if (!rgb) return null;
                const [r, g, b] = rgb.map(v => Math.round(v));
                return `rgb(${r} ${g} ${b})`;
            }

            function darken(rgb, amount) {
                return rgb.map(v => Math.max(0, v * amount));
            }

            function lightenCss(css, amount) {
                const match = css.match(/(\d+)\s+(\d+)\s+(\d+)/);
                if (!match) return css;
                const [r, g, b] = match.slice(1).map(Number);
                const nr = Math.min(255, Math.round(r + (255 - r) * amount));
                const ng = Math.min(255, Math.round(g + (255 - g) * amount));
                const nb = Math.min(255, Math.round(b + (255 - b) * amount));
                return `rgb(${nr} ${ng} ${nb})`;
            }

            function glowFrom(css) {
                return css.replace('rgb(', 'rgba(').replace(')', ', 0.35)');
            }

            function loadImage(url) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    img.src = url;
                });
            }

            window.ThemeEngine = ThemeEngine;
        })();

        function emojiToCodepointPath(emoji) {
            return [...emoji].map(c => c.codePointAt(0).toString(16)).join('-');
        }

        function escapeHTML(s) {
            return s.replace(/[&<>"]/g, c => ({
                '&': '&amp;',
                '<': '&lt;',
                '"': '&quot;'
            })[c]);
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec) || sec < 0) return '0:00';
            const m = Math.floor(sec / 60),
                s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2,'0')}`;
        }

        function extractYouTubeID(input) {
            if (!input) return null;
            const bare = input.match(/^([a-zA-Z0-9_-]{11})$/);
            if (bare) return bare[1];
            const url = input.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            return url ? url[1] : null;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.onerror = reject;
                r.readAsDataURL(file);
            });
        }

        async function extractPDFText(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument({
                    data: arrayBuffer
                }).promise;
                let text = '';
                for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(it => it.str).join(' ') + '\n';
                }
                return text.substring(0, 6000);
            } catch (e) {
                console.error(e);
                return '[PDF extraction error]';
            }
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function isValidImageUrl(url) {
            try {
                const parsed = new URL(url);
                if (!['http:', 'https:'].includes(parsed.protocol)) return false;
                return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(parsed.pathname);
            } catch {
                return false;
            }
        }

        function removeArtistFromTitle(title, artist) {
            if (!title) return title;
            let cleaned = title.trim();
            if (artist) {
                const pattern = new RegExp(`^${artist}\\s*-?\\s*`, 'i');
                cleaned = cleaned.replace(pattern, '').trim();
            }
            if (cleaned.includes('-')) {
                cleaned = cleaned.split('-').slice(1).join('-').trim();
            }
            return cleaned;
        }

        function getTimestamp() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
        }

                    STATE.settings = {

                        ...parsed.settings

                    STATE.playlist = parsed.playlist || [];
                    STATE.currentTrackIndex = parsed.currentTrackIndex ?? -1;
                    STATE.chatHistory = parsed.chatHistory || [];

                    STATE.lyricsEnabled = parsed.lyricsEnabled ?? false;

                    STATE.messageIdCounter = parsed.messageIdCounter || 1;

                    STATE.karaokeActive = parsed.karaokeActive || false;
                }
            } catch (e) {
                console.warn('loadState:', e);
            }
        }

        function applyTheme(theme) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let effective = theme;
            if (effective === 'system') effective = prefersDark ? 'dark' : 'light';
            document.body.classList.toggle('dark', effective === 'dark');
            const sel = document.getElementById('themeSelect');
            if (sel) sel.value = theme;
            localStorage.setItem('hexai_theme_pref', theme);
            const root = document.documentElement;
            const appearance = root.getAttribute('data-theme');
            if (appearance) {
                root.setAttribute('data-mode', effective === 'dark' ? 'dark' : 'light');
            }
        }

        function getThemePreference() {
            return localStorage.getItem('hexai_theme_pref') || 'system';

            const modal = document.getElementById('settingsOverlay');
            modal.classList.toggle('hidden');

                if (transLang) transLang.value = STATE.settings.translationTargetLang || 'en';
                onProviderChange();
                populateModelDropdown();
            }

        function onProviderChange() {
            const provider = document.getElementById('providerSelect').value;
            const orSection = document.getElementById('openRouterKeySection');
            const geminiSection = document.getElementById('geminiKeySection');
            orSection.style.display = provider === 'openrouter' ? 'block' : 'none';
            geminiSection.style.display = provider === 'gemini' ? 'block' : 'none';
            if (provider === 'openrouter') populateModelDropdown();
        }

        async function refreshOpenRouterModels() {
            const key = document.getElementById('openRouterKeyInput').value.trim();
            if (!key) {
                showToast('⚠️ Enter OpenRouter API key first.', 'error');
                return;
            }
            const btn = document.getElementById('refreshModelsBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                const resp = await fetch('https://openrouter.ai/api/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${key}`
                    }
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                const models = data.data || [];
                const freeModels = models.filter(m =>
                    m.id.includes('free') || m.id.includes('flash') || m.id.includes('mini') ||
                    m.id.includes('haiku') || m.id.includes('llama') || m.id.includes('mistral') ||
                    m.id.includes('gemini')
                ).map(m => m.id);
                const list = freeModels.length ? freeModels : models.map(m => m.id);
                STATE.settings.openRouterModels = list;
                const sel = document.getElementById('modelSelect');
                sel.innerHTML = list.map(id => `<option value="${id}">${id}</option>`).join('');
                if (list.length) sel.value = list[0];
                showToast(`✔ ${list.length} models loaded!`);
                saveState();
            } catch (err) {
                showToast('✘' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync"></i>';
            }
        }

        function populateModelDropdown() {
            const provider = document.getElementById('providerSelect').value;
            if (provider === 'openrouter') {
                const sel = document.getElementById('modelSelect');
                const stored = STATE.settings.openRouterModels;
                if (stored && stored.length) {
                    sel.innerHTML = stored.map(id => `<option value="${id}">${id}</option>`).join('');
                    if (STATE.settings.chatModel && stored.includes(STATE.settings.chatModel)) {
                        sel.value = STATE.settings.chatModel;
                    } else {
                        sel.value = stored[0] || '';
                    }
                } else {
                    sel.innerHTML =
                        `<option value="google/gemini-3.1-flash-lite">gemini-3.1-flash-lite</option><option value="openai/gpt-4o-mini">GPT-4o Mini</option><option value="anthropic/claude-3-haiku">Claude 3 Haiku</option><option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>`;
                    sel.value = STATE.settings.chatModel || 'gemini-3.1-flash-lite';
                }
            } else {
                const sel = document.getElementById('geminiModelSelect');
                sel.value = STATE.settings.geminiModel || 'gemini-3.1-flash-lite';
            }
        }

        function saveSettings() {
            const provider = document.getElementById('providerSelect').value;
            STATE.settings.provider = provider;
            STATE.settings.openRouterKey = document.getElementById('openRouterKeyInput').value.trim();
            STATE.settings.geminiKey = document.getElementById('geminiKeyInput').value.trim();

            if (transService) STATE.settings.translationService = transService.value;
            const transLang = document.getElementById('translationTargetLang');
            if (transLang) STATE.settings.translationTargetLang = transLang.value;
            if (provider === 'openrouter') {

                STATE.settings.chatModel = sel.value;
            } else {
                const sel = document.getElementById('geminiModelSelect');
                STATE.settings.geminiModel = sel.value;
            }
            applyTheme(STATE.settings.theme);
            if (window.ThemeEngine) {
                window.ThemeEngine.applyThemeAppearance(STATE.settings.themeAppearance || 'default');
            }
            saveState();
            updateModelBadge();
            toggleSettings();
            showToast('✔ Settings saved!');
        }

        function updateModelBadge() {
            const dot = document.getElementById('modelBadgeDot');
            const text = document.getElementById('modelBadgeText');
            const provider = STATE.settings.provider;
            const key = provider === 'openrouter' ? STATE.settings.openRouterKey : STATE.settings.geminiKey;
            const model = provider === 'openrouter' ? STATE.settings.chatModel : STATE.settings.geminiModel;
            if (key && key.length > 8) {
                dot.className = 'model-badge-dot online';
                const shortModel = model.replace('google/', '').replace('openai/', '').replace('anthropic/', '').replace(
                    'meta-llama/', '');
                text.textContent = '' + shortModel.substring(0, 14);
            } else if (key && key.length > 0) {
                dot.className = 'model-badge-dot idle';
                text.textContent = 'Key set';
            } else {
                dot.className = 'model-badge-dot offline';
                text.textContent = 'No API Key';
            }
        }

        function switchPanel(name) {
            STATE.activePanel = name;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

        function handleChatKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            autoResizeTextarea(e.target);
        }

        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleFileAttach(e) {
            const files = Array.from(e.target.files);
            files.forEach(f => STATE.attachedFiles.push(f));
            renderFilePreview();
            e.target.value = '';

        function renderFilePreview() {
            const container = document.getElementById('filePreview');
            container.innerHTML = STATE.attachedFiles.map((f, i) => {
                const icon = f.type.startsWith('image/') ? 'fa-image' : 'fa-file-pdf';
                const name = f.name.length > 18 ? f.name.substring(0, 16) + '…' : f.name;
                return `<span class="file-preview-item"><i class="fas ${icon}"></i> ${name} <span class="remove" onclick="STATE.attachedFiles.splice(${i},1);renderFilePreview();">×</span></span>`;
