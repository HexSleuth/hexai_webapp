<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HEX AI – Models Online</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js"></script>

    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-tertiary: #7D5260;
            --md-sys-color-on-tertiary: #FFFFFF;
            --md-sys-color-tertiary-container: #FFD8E4;
            --md-sys-color-on-tertiary-container: #31111D;
            --md-sys-color-error: #B3261E;
            --md-sys-color-on-error: #FFFFFF;
            --md-sys-color-error-container: #F9DEDC;
            --md-sys-color-on-error-container: #410E0B;
            --md-sys-color-surface: #FFFBFE;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-outline-variant: #CAC4D0;
            --md-sys-color-inverse-surface: #313033;
            --md-sys-color-inverse-on-surface: #F4EFF4;
            --md-sys-color-surface-container: #F3EDF1;
            --md-sys-color-surface-container-high: #ECE6EC;
            --md-sys-color-surface-container-low: #F7F2F7;
            --md-sys-elevation-1: 0 1px 2px 0 rgba(0, 0, 0, 0.15), 0 1px 3px 1px rgba(0, 0, 0, 0.10);
            --md-sys-elevation-2: 0 1px 2px 0 rgba(0, 0, 0, 0.20), 0 2px 6px 2px rgba(0, 0, 0, 0.12);
            --md-sys-elevation-3: 0 4px 8px 3px rgba(0, 0, 0, 0.15), 0 1px 3px 0 rgba(0, 0, 0, 0.20);
            --md-sys-elevation-4: 0 6px 10px 4px rgba(0, 0, 0, 0.15), 0 2px 3px 0 rgba(0, 0, 0, 0.20);
            --md-sys-elevation-5: 0 8px 12px 6px rgba(0, 0, 0, 0.15), 0 4px 4px 0 rgba(0, 0, 0, 0.20);
            --transition-fast: 200ms cubic-bezier(0.2, 0, 0, 1);
            --transition-medium: 300ms cubic-bezier(0.2, 0, 0, 1);
            --border-radius-sm: 12px;
            --border-radius-md: 16px;
            --border-radius-lg: 20px;
            --border-radius-xl: 24px;
            --border-radius-full: 9999px;
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;
            --md-sys-color-tertiary: #EFB8C8;
            --md-sys-color-on-tertiary: #492532;
            --md-sys-color-tertiary-container: #633B48;
            --md-sys-color-on-tertiary-container: #FFD8E4;
            --md-sys-color-error: #F2B8B5;
            --md-sys-color-on-error: #601410;
            --md-sys-color-error-container: #8C1D18;
            --md-sys-color-on-error-container: #F9DEDC;
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: #938F99;
            --md-sys-color-outline-variant: #49454F;
            --md-sys-color-inverse-surface: #E6E1E5;
            --md-sys-color-inverse-on-surface: #313033;
            --md-sys-color-surface-container: #201F24;
            --md-sys-color-surface-container-high: #2A292E;
            --md-sys-color-surface-container-low: #1C1B1F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background var(--transition-medium), color var(--transition-medium);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--md-sys-color-surface-container);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            z-index: 100;
            gap: 10px;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
        }
        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-logo {
            width: 38px;
            height: 38px;
            border-radius: var(--border-radius-sm);
            background: linear-gradient(135deg, #6750A4, #D0BCFF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 700;
            box-shadow: var(--md-sys-elevation-2);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(103, 80, 164, 0.4);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(103, 80, 164, 0);
            }
        }
        .app-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--md-sys-color-on-surface);
        }
        .app-name span {
            color: var(--md-sys-color-primary);
        }
        .online-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            color: #1B8A3D;
            background: #E6F4EA;
            padding: 3px 8px;
            border-radius: var(--border-radius-full);
        }
        [data-theme="dark"] .online-badge {
            color: #5CDF7C;
            background: #0D3320;
        }
        .online-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1B8A3D;
            animation: dotBlink 2s ease-in-out infinite;
        }
        [data-theme="dark"] .online-dot {
            background: #5CDF7C;
        }
        @keyframes dotBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .title-bar-center {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
            position: relative;
        }
        .model-badge {
            padding: 6px 14px;
            border-radius: var(--border-radius-full);
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .model-badge:hover {
            filter: brightness(1.05);
            box-shadow: var(--md-sys-elevation-1);
        }
        .provider-tag {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: var(--border-radius-full);
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .provider-tag.openrouter {
            background: #FFE0B2;
            color: #E65100;
        }
        .provider-tag.gemini {
            background: #BBDEFB;
            color: #0D47A1;
        }
        [data-theme="dark"] .provider-tag.openrouter {
            background: #3E2723;
            color: #FFB74D;
        }
        [data-theme="dark"] .provider-tag.gemini {
            background: #0D2137;
            color: #64B5F6;
        }

        .model-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--md-sys-color-surface-container);
            border-radius: var(--border-radius-md);
            box-shadow: var(--md-sys-elevation-4);
            z-index: 300;
            min-width: 260px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            padding: 6px;
        }
        .model-dropdown.open {
            display: block;
        }
        .model-dropdown-item {
            padding: 10px 14px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition-fast);
            color: var(--md-sys-color-on-surface);
        }
        .model-dropdown-item:hover {
            background: var(--md-sys-color-surface-container-high);
        }
        .model-dropdown-item.active {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            font-weight: 600;
        }

        .title-bar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all var(--transition-fast);
            position: relative;
        }
        .icon-btn:hover {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
        }
        .icon-btn:active {
            transform: scale(0.92);
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .menu-bar {
            display: flex;
            gap: 2px;
            padding: 6px 12px;
            background: var(--md-sys-color-surface-container-low);
            overflow-x: auto;
            flex-shrink: 0;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            scrollbar-width: none;
        }
        .menu-bar::-webkit-scrollbar {
            display: none;
        }
        .menu-tab {
            padding: 8px 16px;
            border-radius: var(--border-radius-full);
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
            transition: all var(--transition-fast);
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .menu-tab.active {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            box-shadow: var(--md-sys-elevation-1);
        }
        .menu-tab:hover:not(.active) {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .panel {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            animation: fadeSlideIn 0.35s cubic-bezier(0.2, 0, 0, 1);
        }
        .panel.active {
            display: flex;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline-variant);
            border-radius: 10px;
        }
        .message {
            display: flex;
            gap: 8px;
            max-width: 88%;
            animation: msgIn 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            box-shadow: var(--md-sys-elevation-1);
        }
        .message.user .message-avatar {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }
        .message.assistant .message-avatar {
            background: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
        }
        .message-bubble {
            padding: 10px 14px;
            border-radius: var(--border-radius-lg);
            font-size: 13px;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
            box-shadow: var(--md-sys-elevation-1);
            transition: all var(--transition-fast);
        }
        .message.user .message-bubble {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border-bottom-right-radius: 6px;
        }
        .message.assistant .message-bubble {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
            border-bottom-left-radius: 6px;
        }
        .message-emoji {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            display: inline-block;
        }
        .message-actions {
            display: flex;
            gap: 4px;
            margin-top: 2px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .message:hover .message-actions {
            opacity: 1;
        }
        .msg-action-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            background: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            font-size: 10px;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .msg-action-btn:hover {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
        }
        .msg-action-btn.delete:hover {
            background: var(--md-sys-color-error-container);
            color: var(--md-sys-color-on-error-container);
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 14px;
            background: var(--md-sys-color-surface-container-high);
            border-radius: var(--border-radius-lg);
            align-self: flex-start;
        }
        .typing-indicator.active {
            display: flex;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--md-sys-color-on-surface-variant);
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-7px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 10px 14px;
            background: var(--md-sys-color-surface-container);
            border-top: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: var(--md-sys-color-surface-container-high);
            border-radius: var(--border-radius-xl);
            padding: 5px 8px;
            gap: 5px;
            box-shadow: var(--md-sys-elevation-1);
            transition: all var(--transition-fast);
            border: 2px solid transparent;
        }
        .input-wrapper:focus-within {
            border-color: var(--md-sys-color-primary);
            box-shadow: var(--md-sys-elevation-2);
        }
        .chat-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 7px 4px;
            font-size: 13px;
            font-family: inherit;
            color: var(--md-sys-color-on-surface);
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 22px;
            line-height: 1.4;
        }
        .input-icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-icon-btn:hover {
            background: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-primary);
        }
        .input-icon-btn.voice-active {
            color: var(--md-sys-color-error);
            animation: dotBlink 0.8s ease-in-out infinite;
        }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            cursor: pointer;
            font-size: 15px;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: var(--md-sys-elevation-2);
        }
        .send-btn:hover {
            box-shadow: var(--md-sys-elevation-3);
            transform: scale(1.04);
        }
        .send-btn:active {
            transform: scale(0.92);
        }
        .send-btn:disabled {
            background: var(--md-sys-color-outline-variant);
            color: var(--md-sys-color-outline);
            cursor: not-allowed;
            box-shadow: none;
        }

        .emoji-picker-3d {
            position: absolute;
            bottom: 70px;
            right: 16px;
            z-index: 200;
            display: none;
            background: var(--md-sys-color-surface-container);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--md-sys-elevation-5);
            padding: 10px;
            width: 320px;
            max-height: 320px;
            overflow-y: auto;
            animation: fadeSlideIn 0.25s ease;
            flex-wrap: wrap;
            gap: 4px;
        }
        .emoji-picker-3d.open {
            display: flex;
        }
        .emoji-3d-item {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all var(--transition-fast);
            padding: 2px;
        }
        .emoji-3d-item:hover {
            background: var(--md-sys-color-surface-container-high);
            transform: scale(1.15);
        }
        .emoji-3d-item img {
            width: 32px;
            height: 32px;
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .settings-overlay.show {
            display: flex;
        }
        .settings-panel {
            background: var(--md-sys-color-surface-container);
            border-radius: var(--border-radius-xl);
            padding: 24px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--md-sys-elevation-5);
            animation: scaleIn 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .settings-section {
            margin-bottom: 16px;
        }
        .settings-section label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 5px;
        }
        .settings-section input,
        .settings-section select {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--border-radius-sm);
            border: 1.5px solid var(--md-sys-color-outline-variant);
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: inherit;
            font-size: 13px;
            transition: all var(--transition-fast);
            outline: none;
        }
        .settings-section input:focus,
        .settings-section select:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.15);
        }
        .settings-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .md-btn {
            padding: 9px 18px;
            border-radius: var(--border-radius-full);
            border: none;
            cursor: pointer;
            font-weight: 600;

            emojiToCodepointPath(emoji) {
                return [...emoji].map(c => c.codePointAt(0).toString(16)).join('-');
            }
            processMessageText(text) {
                if (!text) return '';
                const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
                const segments = [...segmenter.segment(text)];
                let result = '';
                for (const { segment } of segments) {
                    if (/\p{Emoji}/u.test(segment)) {
                        const cp = this.emojiToCodepointPath(segment);
                        result +=
                            `<img src="https://fonts.gstatic.com/s/e/notoemoji/latest/${cp}/512.gif" alt="${segment}" class="message-emoji" loading="lazy" onerror="this.outerHTML='<span>${segment}</span>';">`;
                    } else {
                        result += this.escapeHtml(segment);
                    }
                }
                return result;
            }
            escapeHtml(s) {
                return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
            }

            init3DEmojiPicker() {
                if (!this.emojiPicker3D) return;
                this.emojiPicker3D.innerHTML = '';
                this.emojiList.forEach(emoji => {
                    const span = document.createElement('span');
                    span.className = 'emoji-3d-item';
                    const cp = this.emojiToCodepointPath(emoji);
                    span.innerHTML =
                        `<img src="https://fonts.gstatic.com/s/e/notoemoji/latest/${cp}/512.gif" alt="${emoji}" width="32" height="32" loading="lazy">`;
                    span.addEventListener('click', () => {
                        if (this.promptEditor) {
                            this.promptEditor.focus();
                            document.execCommand('insertText', false, emoji);
                        }
                        this.emojiPicker3D.classList.remove('open');
                    });
                    this.emojiPicker3D.appendChild(span);
                });
            }

            init() {
                this.loadSettings();
                this.applyThemeFromSettings();
                this.populateModelDropdown();
                this.renderModelDropdownMenu();
                this.updateProviderUI();
                this.setupMenuBar();
                this.setupEventListeners();
                this.setupVoiceRecognition();
                this.init3DEmojiPicker();
                this.initImageGenerator();
                this.initVideoGenerator();
                this.loadChat();
                this.requestNotificationPermission();
                this.updateProviderKeySections();
            }

            applyThemeFromSettings() {
                const savedTheme = localStorage.getItem('hexai_theme') || 'system';
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let theme = savedTheme;
                if (theme === 'system') theme = prefersDark ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                this.updateThemeIcon();
            }
            updateThemeIcon() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (this.themeToggle) this.themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' :
                    '<i class="fas fa-moon"></i>';
            }
            toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('hexai_theme', newTheme);
                if (this.themeSelect) this.themeSelect.value = newTheme;
                this.updateThemeIcon();
            }

            loadSettings() {
                const saved = JSON.parse(localStorage.getItem('hexai_settings') || '{}');
                if (saved.openRouterKey) { this.apiKey = saved.openRouterKey; if (this.openRouterKeyInput) this
                        .openRouterKeyInput.value = saved.openRouterKey; }
                if (saved.geminiKey) { this.geminiKey = saved.geminiKey; if (this.geminiKeyInput) this.geminiKeyInput
                    .value = saved.geminiKey; }
                if (saved.provider) { this.provider = saved.provider; if (this.providerSelect) this.providerSelect.value =
                        saved.provider; }
                if (saved.model) { this.selectedModel = saved.model; }
                if (saved.theme && this.themeSelect) this.themeSelect.value = saved.theme;
                if (saved.openRouterModels) this.openRouterModels = saved.openRouterModels;
                if (saved.geminiModels) this.geminiModels = saved.geminiModels;
                if (this.providerSelect) this.providerSelect.value = this.provider;
            }

            saveSettings() {
                const settings = {
                    openRouterKey: this.openRouterKeyInput ? this.openRouterKeyInput.value.trim() : this.apiKey,
                    geminiKey: this.geminiKeyInput ? this.geminiKeyInput.value.trim() : this.geminiKey,
                    provider: this.providerSelect ? this.providerSelect.value : this.provider,
                    model: this.modelSelect ? this.modelSelect.value : this.selectedModel,
                    theme: this.themeSelect ? this.themeSelect.value : 'system',
                    openRouterModels: this.openRouterModels,
                    geminiModels: this.geminiModels,
                };
                this.apiKey = settings.openRouterKey;
                this.geminiKey = settings.geminiKey;
                this.provider = settings.provider;
                this.selectedModel = settings.model;
                localStorage.setItem('hexai_settings', JSON.stringify(settings));
                localStorage.setItem('openrouter_key', this.apiKey);
                localStorage.setItem('gemini_key', this.geminiKey);
                localStorage.setItem('hexai_provider', this.provider);
                if (this.provider === 'gemini') {
                    localStorage.setItem('hexai_gemini_model', this.selectedModel);
                } else {
                    localStorage.setItem('hexai_openrouter_model', this.selectedModel);
                }
                localStorage.setItem('hexai_theme', settings.theme);
                this.applyThemeFromSettings();
                this.populateModelDropdown();
                this.renderModelDropdownMenu();
                this.updateProviderUI();
                this.updateProviderKeySections();
                this.showToast('Settings saved! Provider: ' + this.currentProviderLabel, 'fa-save', 2500);
                if (this.settingsOverlay) this.settingsOverlay.classList.remove('show');
            }

            updateProviderKeySections() {
                if (this.openRouterKeySection && this.geminiKeySection) {
                    if (this.provider === 'gemini') {
                        this.openRouterKeySection.style.opacity = '0.5';
                        this.geminiKeySection.style.opacity = '1';
                    } else {
                        this.openRouterKeySection.style.opacity = '1';
                        this.geminiKeySection.style.opacity = '0.5';
                    }
                }
            }

            updateProviderUI() {
                if (this.providerTag) {
                    this.providerTag.textContent = this.provider === 'gemini' ? 'GEM' : 'OR';
                    this.providerTag.className = 'provider-tag ' + (this.provider === 'gemini' ? 'gemini' :
                    'openrouter');
                }
                if (this.providerSelect) this.providerSelect.value = this.provider;
                this.updateProviderKeySections();
            }

            populateModelDropdown(customModels) {
                const models = customModels || this.activeModels;
                if (this.modelSelect) {
                    this.modelSelect.innerHTML = '<option value="">Select a model...</option>';
                    models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.value;
                        opt.textContent = m.label;
                        this.modelSelect.appendChild(opt);
                    });
                    if (this.selectedModel && models.some(m => m.value === this.selectedModel)) {
                        this.modelSelect.value = this.selectedModel;
                    } else if (models.length > 0) {
                        this.modelSelect.value = models[0].value;
                        this.selectedModel = models[0].value;
                    }
                }
            }

            renderModelDropdownMenu() {
                if (!this.modelDropdown) return;
                this.modelDropdown.innerHTML = '';
                const models = this.activeModels;
                models.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'model-dropdown-item' + (m.value === this.selectedModel ? ' active' : '');
                    div.textContent = m.label;
                    div.addEventListener('click', () => {
                        this.selectedModel = m.value;
                        if (this.provider === 'gemini') {
                            localStorage.setItem('hexai_gemini_model', m.value);
                        } else {
                            localStorage.setItem('hexai_openrouter_model', m.value);
                        }
                        this.renderModelDropdownMenu();
                        this.updateModelBadge();
                        if (this.modelSelect) this.modelSelect.value = m.value;
                        this.modelDropdown.classList.remove('open');
                        this.showToast('Model: ' + m.label.split(' ').slice(0, 2).join(' '), 'fa-cube',
                            2000);
                    });
                    this.modelDropdown.appendChild(div);
                });
                this.updateModelBadge();
            }

            updateModelBadge() {
                if (!this.modelBadgeText) return;
                const models = this.activeModels;
                const model = models.find(m => m.value === this.selectedModel);
                const displayName = model ? model.label.split(' ').slice(0, 2).join(' ') : 'Select Model';
                this.modelBadgeText.textContent = displayName;
                this.updateProviderUI();
            }

            async refreshModels(silent = false) {
                if (this.provider === 'gemini') {
                    this.showToast('Gemini models are preloaded. Select from the list.', 'fa-info-circle', 3000);
                    this.populateModelDropdown(this.geminiModels);
                    this.renderModelDropdownMenu();
                    return;
                }
                if (!this.apiKey) { this.showToast('Enter OpenRouter key first!', 'fa-key', 3000); return; }
                const btn = this.refreshModelsBtn;
                if (btn) { btn.disabled = true;
                    btn.innerHTML = '<span class="refresh-spinner"></span> Loading...'; }
                try {
                    const res = await fetch('https://openrouter.ai/api/v1/models', { headers: { Authorization: `Bearer ${this.apiKey}` } });
                    const data = await res.json();
                    const free = data.data.filter(m => m.pricing?.prompt === '0');
                    this.openRouterModels = free.map(m => ({ label: m.name || m.id, value: m.id })).slice(0, 30);
                    if (this.openRouterModels.length === 0) this.openRouterModels = [
                        { label: 'gemini-3.1-flash-lite (Free)', value: 'google/gemini-3.1-flash-lite' },
                    ];
                    this.populateModelDropdown(this.openRouterModels);
                    this.renderModelDropdownMenu();
                    this.showToast('Loaded ' + this.openRouterModels.length + ' free models!', 'fa-sync-alt', 2500);
                } catch (e) {
                    this.showToast('Failed: ' + e.message, 'fa-times-circle', 3500);
                } finally {
                    if (btn) { btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh'; }
                }
            }

            loadChat() {
                const saved = localStorage.getItem('hexai_single_chat');
                if (saved) {
                    this.chat = JSON.parse(saved);
                } else {
                    this.chat = {
                        messages: [{
                            role: 'assistant',
                            content: "👋 **HEX AI ready!** Setup API KEYS in Settings. Choose provider: Open Router or Gemini. Upload images/PDFs, use voice input, generate images & videos, play music! 🌈",
                            timestamp: new Date().toISOString(),
                            model: 'Welcome'
                        }]
                    };
                    this.saveChat();
                }
                if (this.chatMessages) {
                    this.chatMessages.innerHTML = '';
                    this.chat.messages.forEach((m, i) => this.renderMessage(m, i));
                }
                this.scrollToBottom();
            }
            saveChat() {
                localStorage.setItem('hexai_single_chat', JSON.stringify(this.chat));
            }
            resetChat() {
                this.chat = {
                    messages: [{
                        role: 'assistant',
                        content: "👋 **Chat reset.** Provider: **" + this.currentProviderLabel +
                            "** | Model: **" + (this.activeModels.find(m => m.value === this
                                .selectedModel)?.label || this.selectedModel) +
                            "**. Start a new conversation!",
                        timestamp: new Date().toISOString(),
                        model: 'Welcome'
                    }]
                };
                this.saveChat();
                if (this.chatMessages) {
                    this.chatMessages.innerHTML = '';
                    this.chat.messages.forEach((m, i) => this.renderMessage(m, i));
                }
                this.scrollToBottom();
                this.showToast('Chat cleared', 'fa-undo', 1500);
            }

            renderMessage(msg, idx) {
                if (!this.chatMessages) return null;
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                const avatar = msg.role === 'user' ? '𓋹' : 'AI';
                const processedContent = this.processMessageText(msg.content || '');
                let html = '';
                if (msg.role === 'assistant') {
                    html =
                        `<div class="message-avatar">${avatar}</div><div style="flex:1;min-width:0;"><div class="message-bubble"><div class="markdown-content"></div></div><div class="message-actions"><button class="msg-action-btn copy" title="Copy"><i class="fas fa-copy"></i></button><button class="msg-action-btn delete" title="Delete"><i class="fas fa-trash"></i></button></div><small style="font-size:10px;color:var(--md-sys-color-on-surface-variant);">${msg.model || 'AI'} • ${new Date(msg.timestamp).toLocaleTimeString()}</small></div>`;
                } else {
                    let attachHtml = '';
                    if (msg.attachments?.length) {
                        attachHtml = '<div class="d-flex gap-2 mt-1">' + msg.attachments.filter(a => a.type ===
                            'image').map(a =>
                            `<img src="${a.dataURL}" style="max-width:80px;border-radius:10px;" alt="attachment">`
                            ).join('') + '</div>';
                    }
                    html =
                        `<div class="message-avatar">${avatar}</div><div style="flex:1;min-width:0;"><div class="message-bubble">${processedContent}${attachHtml}</div><div class="message-actions"><button class="msg-action-btn copy" title="Copy"><i class="fas fa-copy"></i></button><button class="msg-action-btn delete" title="Delete"><i class="fas fa-trash"></i></button></div></div>`;
                }
                div.innerHTML = html;
                this.chatMessages.appendChild(div);
                if (msg.role === 'assistant') {
                    const md = div.querySelector('.markdown-content');
                    if (md) {
                        md.innerHTML = marked.parse(processedContent);
                        if (window.hljs) md.querySelectorAll('pre code').forEach(block => hljs.highlightElement(
                            block));
                    }
                }
                this.setupMessageActions(div);
                return div;
            }
            setupMessageActions(msgDiv) {
                const copyBtn = msgDiv.querySelector('.copy');
                const deleteBtn = msgDiv.querySelector('.delete');
                if (copyBtn) {
                    copyBtn.addEventListener('click', () => {
                        const bubble = msgDiv.querySelector('.message-bubble');
                        const text = bubble ? bubble.textContent.trim() : '';
                        // Fallback copy function
                        const fallbackCopy = (txt) => {
                            const textarea = document.createElement('textarea');
                            textarea.value = txt;
                            textarea.style.position = 'fixed';
                            textarea.style.opacity = '0';
                            document.body.appendChild(textarea);
                            textarea.select();
                            try {
                                document.execCommand('copy');
                                this.showToast(' Copied!', 'fa-copy', 1500);
                            } catch (err) {
                                this.showToast('Copy failed', 'fa-times', 1500);
                            } finally {
                                textarea.remove();
                            }
                        };
                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(text).then(() => {
                                this.showToast(' Copied!', 'fa-copy', 1500);
                            }).catch(() => fallbackCopy(text));
                        } else {
                            fallbackCopy(text);
                        }
                    });
                }
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', () => {
                        const idx = Array.from(msgDiv.parentNode.children).indexOf(msgDiv);
                        this.chat.messages.splice(idx, 1);
                        this.saveChat();
                        if (this.chatMessages) {
                            this.chatMessages.innerHTML = '';
                            this.chat.messages.forEach((m, i) => this.renderMessage(m, i));
                        }
                        this.scrollToBottom();
                        this.showToast('Message deleted', 'fa-trash-alt', 1500);
                    });
                }
            }

            setupMenuBar() {
                if (!this.menuBar) return;
                this.menuBar.querySelectorAll('.menu-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.menuBar.querySelectorAll('.menu-tab').forEach(t => t.classList.remove(
                            'active'));
                        tab.classList.add('active');
                        this.switchPanel(tab.dataset.panel);
                    });
                });
            }
            switchPanel(name) {
                this.currentPanel = name;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                const panel = document.getElementById(`panel-${name}`);
                if (panel) panel.classList.add('active');
            }

                    .remove('show'));
                if (this.settingsOverlay) {
                    this.settingsOverlay.addEventListener('click', e => { if (e.target === this.settingsOverlay) this
                            .settingsOverlay.classList.remove('show'); });
                }
                if (this.saveSettingsBtn) this.saveSettingsBtn.addEventListener('click', () => this.saveSettings());
                if (this.refreshModelsBtn) this.refreshModelsBtn.addEventListener('click', () => this.refreshModels());
                if (this.themeToggle) this.themeToggle.addEventListener('click', () => this.toggleTheme());
                if (this.themeSelect) this.themeSelect.addEventListener('change', () => {
                    localStorage.setItem('hexai_theme', this.themeSelect.value);
                    this.applyThemeFromSettings();
                });

                        }
                        this.populateModelDropdown();
                        this.renderModelDropdownMenu();

                        this.showToast('Provider: ' + this.currentProviderLabel, 'fa-exchange-alt', 2000);

            setupVoiceRecognition() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { if (this.voiceBtn) this.voiceBtn.style.display = 'none'; return; }
                this.speechRecognition = new SR();
                this.speechRecognition.continuous = false;
                this.speechRecognition.interimResults = true;
                this.speechRecognition.lang = 'en-US';
                this.speechRecognition.onresult = e => {
                    if (this.promptEditor) {
                        this.promptEditor.innerText = Array.from(e.results).map(r => r[0].transcript).join('');
                    }
                };
                this.speechRecognition.onend = () => { this.isVoiceActive = false; if (this.voiceBtn) this.voiceBtn
                        .classList.remove('voice-active'); };
                this.speechRecognition.onerror = () => { this.isVoiceActive = false; if (this.voiceBtn) this.voiceBtn
                        .classList.remove('voice-active'); };
            }
            toggleVoiceInput() {
                if (!this.speechRecognition) { this.showToast('Voice not supported', 'fa-microphone-slash', 2500); return; }
                if (this.isVoiceActive) {
                    this.speechRecognition.stop();
                    this.isVoiceActive = false;
                    if (this.voiceBtn) this.voiceBtn.classList.remove('voice-active');
                } else {
                    this.speechRecognition.start();
                    this.isVoiceActive = true;
                    if (this.voiceBtn) this.voiceBtn.classList.add('voice-active');
                    this.showToast('Listening...', 'fa-microphone', 2000);
                }
            }

            handleFileUpload(e) {
                const files = e.target.files;
                if (!files || !files.length) return;
                for (let file of files) {
                    if (file.type.startsWith('image/')) {
                        const url = URL.createObjectURL(file);
                        this.pendingAttachments.push({ file, previewUrl: url, type: 'image', name: file.name });
                    } else if (file.type === 'application/pdf') {
                        this.pendingAttachments.push({ file, previewUrl: null, type: 'pdf', name: file.name });
                    }
                }
                this.updateAttachmentUI();
                if (this.fileInput) this.fileInput.value = '';
                if (this.pendingAttachments.length) this.showToast('' + this.pendingAttachments.length +
                    ' attachment(s)', 'fa-paperclip', 2000);
            }
            clearUploadedFile() {
                this.uploadedFile = null;
                if (this.fileInput) this.fileInput.value = '';
                if (this.filePreview) this.filePreview.classList.remove('show');
            }
            updateAttachmentUI() {
                if (!this.attachmentPreviewContainer) return;
                this.attachmentPreviewContainer.innerHTML = '';
                this.pendingAttachments.forEach((att, idx) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'position-relative d-inline-block me-1 mb-1';
                    if (att.type === 'image' && att.previewUrl) {
                        const img = document.createElement('img');
                        img.src = att.previewUrl;
                        img.style.cssText =
                            'width:50px;height:50px;object-fit:cover;border-radius:10px;';
                        wrap.appendChild(img);
                    } else if (att.type === 'pdf') {
                        wrap.innerHTML =
                            `<div class="p-1 rounded" style="background:var(--md-sys-color-surface-container);font-size:10px;"><i class="fas fa-file-pdf text-danger"></i> ${att.name.substring(0, 12)}</div>`;
                    }
                    const rm = document.createElement('button');
                    rm.innerHTML = '✕';
                    rm.className =
                        'btn btn-sm btn-danger position-absolute top-0 start-100 translate-middle rounded-circle p-0';
                    rm.style.cssText = 'width:18px;height:18px;font-size:10px;';
                    rm.onclick = (e) => { e.stopPropagation();
                        this.pendingAttachments.splice(idx, 1);
                        this.updateAttachmentUI(); };
                    wrap.appendChild(rm);
                    this.attachmentPreviewContainer.appendChild(wrap);
                });
            }
            clearAttachments() {
                this.pendingAttachments.forEach(a => { if (a.previewUrl) URL.revokeObjectURL(a.previewUrl); });
                this.pendingAttachments = [];
                this.updateAttachmentUI();
            }

            async sendMessage() {
                let text = this.promptEditor ? this.promptEditor.innerText.trim() : '';
                if (!text && !this.pendingAttachments.length) return;
                if (this.isProcessing) return;
                this.isProcessing = true;
                if (this.sendBtn) this.sendBtn.disabled = true;

                const processed = [];
                for (let att of this.pendingAttachments) {
                    if (att.type === 'image') {
                        const dataURL = await this.fileToBase64(att.file);
                        processed.push({ type: 'image', dataURL, name: att.name });
                    } else if (att.type === 'pdf') {
                        const extracted = await this.extractPDFText(att.file);
                        processed.push({ type: 'pdf', name: att.name, extractedText: extracted });
                    }
                }
                let content = text;
                const pdfText = processed.filter(p => p.type === 'pdf').map(p => '📄 ' + p.name + '\n' + p.extractedText)
                    .join('\n\n');
                if (pdfText) content = (content ? content + '\n\n' : '') + pdfText;

                const userMsg = {
                    role: 'user',
                    content,
                    attachments: processed.filter(p => p.type === 'image'),
                    timestamp: new Date().toISOString()
                };
                this.chat.messages.push(userMsg);
                this.renderMessage(userMsg);
                if (this.promptEditor) this.promptEditor.innerHTML = '';
                this.clearAttachments();
                this.saveChat();

                this.showTypingIndicator();
                this.scrollToBottom();
                try {
                    let response;
                    if (this.provider === 'gemini' && this.geminiKey) {
                        response = await this.callGeminiAPI(content, processed);
                    } else if (this.provider === 'openrouter' && this.apiKey) {
                        response = await this.callOpenRouterAPI(content, processed);
                    } else if (this.geminiKey) {
                        response = await this.callGeminiAPI(content, processed);
                    } else if (this.apiKey) {
                        response = await this.callOpenRouterAPI(content, processed);
                    } else {
                        response =
                            "⚠️ Please set up an API key for **" + this.currentProviderLabel +
                            "** in Settings! Click the ⚙️ icon.";
                    }
                    this.hideTypingIndicator();
                    const assistantMsg = { role: 'assistant', content: response, model: this.selectedModel,
                        timestamp: new Date().toISOString() };
                    this.chat.messages.push(assistantMsg);
                    this.renderMessage(assistantMsg);
                    this.saveChat();
                } catch (err) {
                    this.hideTypingIndicator();
                    const errMsg = { role: 'assistant', content: '❌ **Error:** ' + (err.message ||
                            'Something went wrong.'),
                        model: 'Error', timestamp: new Date().toISOString() };
                    this.chat.messages.push(errMsg);
                    this.renderMessage(errMsg);
                    this.saveChat();
                } finally {
                    this.isProcessing = false;
                    if (this.sendBtn) this.sendBtn.disabled = false;
                    this.scrollToBottom();
                }
            }

            async callOpenRouterAPI(message, attachments) {
                const msgs = this.chat.messages.filter(m => m.role !== 'system').map(m => {
                    if (m.role === 'user') {
                        let parts = [{ type: 'text', text: m.content }];
                        m.attachments?.forEach(a => { if (a.type === 'image') parts.push({ type: 'image_url',
                                image_url: { url: a.dataURL } }); });
                        return { role: 'user', content: parts };
                    }
                    return { role: 'assistant', content: m.content };
                });
                let currentParts = [{ type: 'text', text: message }];
                attachments.filter(a => a.type === 'image').forEach(a => currentParts.push({ type: 'image_url',
                    image_url: { url: a.dataURL } }));
                msgs.push({ role: 'user', content: currentParts });

                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.apiKey, 'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.origin, 'X-Title': 'HEX AI' },
                    body: JSON.stringify({ model: this.selectedModel, messages: msgs, max_tokens: 2000,
                        temperature: 0.7 }),
                });
                if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error?.message || 'API Error: ' + res
                    .status);
                const data = await res.json();
                return data.choices?.[0]?.message?.content || 'No response.';
            }

            // FIXED: Correct Gemini endpoint, uses selectedModel
            async callGeminiAPI(message, attachments) {
                const modelId = this.selectedModel || 'gemini-3.1-flash-lite';
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent`;
                let parts = [{ text: message }];
                for (let att of attachments) {
                    if (att.type === 'image' && att.dataURL) {
                        const base64 = att.dataURL.split(',')[1];
                        parts.push({ inline_data: { mime_type: 'image/jpeg', data: base64 } });
                    } else if (att.type === 'pdf' && att.extractedText) {
                        parts[0].text = 'PDF content: ' + att.extractedText + '\n\nUser: ' + message;
                    }
                }
                const res = await fetch(endpoint + '?key=' + this.geminiKey, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] }),
                });
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || 'Gemini API Error: ' + res.status);
                }
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || 'No response.';
            }

                if (!this.chatMessages) return;
                const typing = document.createElement('div');
                typing.className = 'typing-indicator active';

                typing.innerHTML =

                this.chatMessages.appendChild(typing);

                }, 100);
            }

            fileToBase64(file) {
                return new Promise(r => { const reader = new FileReader();
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(file); });
            }
            async extractPDFText(file) {
                try {
                    const buf = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
                    let text = '';
                    for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(it => it.str).join(' ') + '\n';
                    }
                    return text.substring(0, 6000);
                } catch (e) { return '[PDF extraction error]'; }
            }

            initVideoGenerator() {

            animateImage(img, durationMs, fps) {
                if (!this.videoPreviewCanvas) return;
                const ctx = this.videoPreviewCanvas.getContext('2d');
                const w = this.videoPreviewCanvas.width = 512;
                const h = this.videoPreviewCanvas.height = 512;
                const totalFrames = Math.floor((durationMs / 1000) * fps);
                let frame = 0;
                const stream = this.videoPreviewCanvas.captureStream(fps);
                this.mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('video/webm; codecs=vp8') ?
                        'video/webm; codecs=vp8' : 'video/webm',
                    videoBitsPerSecond: 2500000,
                });
                this.recordedChunks = [];
                this.mediaRecorder.ondataavailable = e => this.recordedChunks.push(e.data);
                this.mediaRecorder.onstop = () => {
                    const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    this.showVideoPreview(url);
                };
                const drawFrame = () => {
                    const progress = frame / totalFrames;

                        yTop, hue); } if (beatFlash > 0.4 && beatCooldown > 0.1) { const count = Math.floor(6 + beatEnergy *
                        18); for (let i = 0; i < count; i++) { const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 60;
                        spawnParticle(WIDTH / 2 + Math.cos(angle) * dist, centerY - Math.abs(Math.sin(angle)) * dist * 0.6, (
                            Math.random() * 360) | 0, 1.4 + beatEnergy); } }
                updateParticles(dt);
                drawParticles();
                const vignetteGrad = ctx.createRadialGradient(WIDTH / 2, HEIGHT / 2, WIDTH * 0.55, WIDTH / 2, HEIGHT / 2,
                    WIDTH * 0.85);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                updateProgressBar();
                updateTimeDisplay(); if (isPlaying && hasAudioFile) updateStatusUI(); }

            function initAudioPlayer() { resizeCanvas(); if (isHowlerAvailable()) { Howler.volume(parseInt(volumeSlider
                        .value) / 100);
                    Howler.autoUnlock = true; }
                updateStatusUI();
                updateVolumeIcon(parseInt(volumeSlider.value) / 100);
                lastFrameTime = performance.now();
                requestAnimationFrame(render);
                tryLoadDefaultAudio(); } if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded',
                    initAudioPlayer);
                else initAudioPlayer();
        })();
    </script>

    <script>
        (function() {
            const musicUploadBtn = document.getElementById('musicUploadBtn');
            const musicUpload = document.getElementById('musicUpload');
            const audioFileInput = document.getElementById('audioFileInput');
            if (musicUploadBtn && audioFileInput) musicUploadBtn.addEventListener('click', () => audioFileInput.click());
            if (musicUpload && audioFileInput) musicUpload.addEventListener('change', function() { if (this.files && this
                    .files.length > 0 && window.HexAudio) window.HexAudio.loadFile(this.files[0]); });
        })();
    </script>
